<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FIFA Mobile Web</title>
  <!-- Firebase compat CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <!-- Three.js CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #111; color: white; overflow: hidden; }
    .screen { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .hidden { display: none !important; }
    button { background: #2ecc71; border: none; color: white; padding: 12px 24px; border-radius: 8px; font-size: 16px; margin: 6px; cursor: pointer; }
    button:disabled { background: #555; cursor: not-allowed; }
    input { padding: 12px; border-radius: 8px; border: none; margin: 6px; width: 250px; font-size: 16px; }
    .panel { background: #1e1e1e; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    h1, h2 { margin-bottom: 10px; }
    .logo-ft { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #333; background: none; border: none; cursor: pointer; opacity: 0.5; }
    .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; max-height: 60vh; overflow-y: auto; padding: 10px; }
    .player-card { background: #2d2d2d; border-radius: 12px; padding: 10px; text-align: center; }
    .player-card img { width: 100%; border-radius: 8px; }
    .game-ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Pantallas -->
    <div id="login-screen" class="screen">
      <div class="panel">
        <h1>Inicio de Sesión</h1>
        <input type="email" id="email" placeholder="Correo electrónico" />
        <input type="password" id="password" placeholder="Contraseña" />
        <button id="login-btn">Iniciar sesión</button>
        <button id="register-btn">Crear cuenta</button>
        <p id="auth-msg" style="color:#e74c3c;"></p>
        <div id="loading-spinner" class="hidden">⏳ Cargando...</div>
      </div>
    </div>

    <div id="main-menu-screen" class="screen hidden">
      <div class="panel">
        <h1>Menú Principal</h1>
        <p>Monedas: <span id="monedas-display">0</span></p>
        <button id="lineup-btn">Alineación</button>
        <button id="play-btn" disabled>Jugar (necesitas jugadores)</button>
        <button id="market-btn">Mercado</button>
      </div>
    </div>

    <div id="lineup-screen" class="screen hidden">
      <div class="panel">
        <h2>Tu Alineación</h2>
        <select id="formation-select">
          <option value="4-4-2">4-4-2</option>
          <option value="4-3-3">4-3-3</option>
          <option value="3-5-2">3-5-2</option>
          <option value="4-2-3-1">4-2-3-1</option>
          <option value="5-3-2">5-3-2</option>
        </select>
        <p>Jugadores en plantilla: <span id="player-count">0</span></p>
        <button id="save-formation-btn">Guardar</button>
        <button id="back-from-lineup">Volver</button>
      </div>
    </div>

    <div id="market-screen" class="screen hidden">
      <div class="panel" style="width:90%; max-width:800px;">
        <h2>Mercado de Fichajes</h2>
        <div class="market-grid" id="market-container"></div>
        <button id="back-from-market">Volver</button>
      </div>
    </div>

    <div id="admin-screen" class="screen hidden">
      <div class="panel">
        <h2>Panel Administrador</h2>
        <input type="text" id="player-name" placeholder="Nombre del jugador" />
        <input type="text" id="player-image" placeholder="URL de la imagen" />
        <input type="number" id="player-price" placeholder="Precio en monedas" />
        <button id="add-player-btn">Añadir carta</button>
        <button id="close-admin">Cerrar</button>
      </div>
    </div>

    <div id="game-mode-screen" class="screen hidden">
      <div class="panel">
        <h2>Elegir Modo de Juego</h2>
        <button id="mode-cara">⚽ Cara a Cara (90 min)</button>
        <button id="mode-ataque">🔥 Ataque Enfrentado</button>
        <button id="back-from-gamemode">Volver</button>
      </div>
    </div>

    <div id="opponent-screen" class="screen hidden">
      <div class="panel">
        <h2>Elegir Rival</h2>
        <button id="vs-bot">🤖 Contra la Máquina</button>
        <button id="vs-friend">👥 Contra Amigo</button>
        <select id="difficulty-select" class="hidden">
          <option value="easy">Fácil</option>
          <option value="medium" selected>Medio</option>
          <option value="hard">Difícil</option>
        </select>
        <button id="start-match-btn">Empezar Partido</button>
        <button id="back-from-opponent">Volver</button>
        <div id="room-controls" class="hidden">
          <input type="text" id="room-code-input" placeholder="Código de sala" />
          <button id="join-room-btn">Unirse</button>
          <button id="create-room-btn">Crear Sala</button>
          <p id="room-status"></p>
        </div>
      </div>
    </div>

    <div id="game-screen" class="screen hidden" style="background: #000;">
      <canvas id="gameCanvas"></canvas>
      <div class="game-ui">
        <p>Minuto: <span id="match-minute">0</span>'</p>
        <p>Marcador: <span id="score-home">0</span> - <span id="score-away">0</span></p>
        <div id="action-buttons">
          <button id="action-shoot">⚽ Chutar</button>
          <button id="action-pass">🔄 Pasar</button>
          <button id="action-dribble">🌀 Regate</button>
        </div>
        <button id="quit-match" style="background:#e74c3c;">Abandonar</button>
      </div>
    </div>
  </div>

  <button class="logo-ft" id="admin-trigger">ft</button>

  <script type="module">
    // ========================= CONFIGURACIÓN FIREBASE =========================
    const firebaseConfig = {
      apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
      authDomain: "kahoot-8529e.firebaseapp.com",
      databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
      projectId: "kahoot-8529e",
      storageBucket: "kahoot-8529e.firebasestorage.app",
      messagingSenderId: "313414356056",
      appId: "1:313414356056:web:4aab4587f7df9393008e2d",
      measurementId: "G-8T4CPC1BQ3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ========================= ELEMENTOS DOM =========================
    const screens = {
      login: document.getElementById('login-screen'),
      mainMenu: document.getElementById('main-menu-screen'),
      lineup: document.getElementById('lineup-screen'),
      market: document.getElementById('market-screen'),
      admin: document.getElementById('admin-screen'),
      gameMode: document.getElementById('game-mode-screen'),
      opponent: document.getElementById('opponent-screen'),
      game: document.getElementById('game-screen')
    };

    function showScreen(screenId) {
      Object.values(screens).forEach(s => s.classList.add('hidden'));
      screens[screenId].classList.remove('hidden');
    }

    // ========================= AUTENTICACIÓN =========================
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const authMsg = document.getElementById('auth-msg');
    const loadingSpinner = document.getElementById('loading-spinner');

    let currentUser = null;

    // Simular retardo de 5 segundos
    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    loginBtn.addEventListener('click', async () => {
      const email = emailInput.value;
      const pass = passInput.value;
      if (!email || !pass) return;
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        showLoading();
        await delay(5000);
        await initUserData();
        showMainMenu();
      } catch (e) {
        authMsg.textContent = e.message;
      }
    });

    registerBtn.addEventListener('click', async () => {
      const email = emailInput.value;
      const pass = passInput.value;
      if (!email || !pass) return;
      try {
        await auth.createUserWithEmailAndPassword(email, pass);
        showLoading();
        await delay(5000);
        await initUserData();
        showMainMenu();
      } catch (e) {
        authMsg.textContent = e.message;
      }
    });

    function showLoading() {
      loadingSpinner.classList.remove('hidden');
      loginBtn.disabled = true;
      registerBtn.disabled = true;
    }

    async function initUserData() {
      if (!currentUser) return;
      const userRef = db.ref(`users/${currentUser.uid}`);
      const snapshot = await userRef.once('value');
      if (!snapshot.exists()) {
        await userRef.set({
          monedas: 0,
          jugadores: [],
          alineacion: '4-4-2'
        });
      }
    }

    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      if (user) {
        await initUserData();
        showMainMenu();
      } else {
        showScreen('login');
      }
    });

    // ========================= DATOS USUARIO =========================
    let userData = { monedas: 0, jugadores: [], alineacion: '4-4-2' };
    const userRef = () => currentUser ? db.ref(`users/${currentUser.uid}`) : null;

    function listenToUserData() {
      if (!currentUser) return;
      userRef().on('value', snap => {
        if (snap.exists()) {
          userData = snap.val();
          updateMainMenu();
        }
      });
    }

    function updateMainMenu() {
      document.getElementById('monedas-display').textContent = userData.monedas || 0;
      const playBtn = document.getElementById('play-btn');
      playBtn.disabled = !userData.jugadores || userData.jugadores.length === 0;
      document.getElementById('player-count').textContent = userData.jugadores ? userData.jugadores.length : 0;
    }

    function showMainMenu() {
      listenToUserData();
      showScreen('mainMenu');
      updateMainMenu();
    }

    // ========================= NAVEGACIÓN PRINCIPAL =========================
    document.getElementById('lineup-btn').addEventListener('click', () => {
      document.getElementById('formation-select').value = userData.alineacion || '4-4-2';
      document.getElementById('player-count').textContent = userData.jugadores ? userData.jugadores.length : 0;
      showScreen('lineup');
    });

    document.getElementById('play-btn').addEventListener('click', () => {
      showScreen('gameMode');
    });

    document.getElementById('market-btn').addEventListener('click', () => {
      loadMarket();
      showScreen('market');
    });

    document.getElementById('save-formation-btn').addEventListener('click', async () => {
      const formation = document.getElementById('formation-select').value;
      await userRef().update({ alineacion: formation });
      alert('Formación guardada.');
      showScreen('mainMenu');
    });

    document.getElementById('back-from-lineup').addEventListener('click', () => showScreen('mainMenu'));
    document.getElementById('back-from-market').addEventListener('click', () => showScreen('mainMenu'));
    document.getElementById('back-from-gamemode').addEventListener('click', () => showScreen('mainMenu'));
    document.getElementById('back-from-opponent').addEventListener('click', () => showScreen('gameMode'));
    document.getElementById('quit-match').addEventListener('click', () => endMatch());

    // ========================= MERCADO =========================
    const marketContainer = document.getElementById('market-container');
    function loadMarket() {
      db.ref('market').on('value', snap => {
        marketContainer.innerHTML = '';
        if (!snap.exists()) {
          marketContainer.innerHTML = '<p>No hay jugadores en venta.</p>';
          return;
        }
        const marketItems = snap.val();
        Object.entries(marketItems).forEach(([id, item]) => {
          const card = document.createElement('div');
          card.className = 'player-card';
          card.innerHTML = `
            <img src="${item.image || 'https://via.placeholder.com/150'}" alt="${item.name}">
            <p><strong>${item.name}</strong></p>
            <p>💰 ${item.price} monedas</p>
            <button class="buy-player" data-id="${id}" data-price="${item.price}">Comprar</button>
          `;
          card.querySelector('.buy-player').addEventListener('click', async (e) => {
            const btn = e.target;
            const price = parseInt(btn.dataset.price);
            if (userData.monedas < price) return alert('Monedas insuficientes.');
            const playerId = btn.dataset.id;
            // Añadir al usuario y quitar del mercado
            const updates = {};
            updates[`users/${currentUser.uid}/monedas`] = userData.monedas - price;
            const newJugadores = [...(userData.jugadores || []), playerId];
            updates[`users/${currentUser.uid}/jugadores`] = newJugadores;
            updates[`market/${playerId}`] = null; // eliminar
            await db.ref().update(updates);
            alert('Jugador comprado.');
          });
          marketContainer.appendChild(card);
        });
      });
    }

    // ========================= ADMIN PANEL =========================
    document.getElementById('admin-trigger').addEventListener('click', () => {
      const password = prompt('Contraseña de administrador:');
      if (password === 'Owner') {
        showScreen('admin');
      } else {
        alert('Contraseña incorrecta.');
      }
    });

    document.getElementById('close-admin').addEventListener('click', () => showScreen('mainMenu'));

    document.getElementById('add-player-btn').addEventListener('click', async () => {
      const name = document.getElementById('player-name').value;
      const image = document.getElementById('player-image').value;
      const price = parseInt(document.getElementById('player-price').value);
      if (!name || !price || isNaN(price)) return alert('Rellena todos los campos.');
      const newPlayerRef = db.ref('market').push();
      await newPlayerRef.set({ name, image, price });
      alert('Jugador añadido al mercado.');
      document.getElementById('player-name').value = '';
      document.getElementById('player-image').value = '';
      document.getElementById('player-price').value = '';
    });

    // ========================= SELECCIÓN DE MODO Y RIVAL =========================
    let selectedMode = 'cara'; // 'cara' o 'ataque'
    let isVsBot = true;
    let difficulty = 'medium';
    let roomId = null;

    document.getElementById('mode-cara').addEventListener('click', () => {
      selectedMode = 'cara';
      showScreen('opponent');
    });
    document.getElementById('mode-ataque').addEventListener('click', () => {
      selectedMode = 'ataque';
      showScreen('opponent');
    });

    const vsBotBtn = document.getElementById('vs-bot');
    const vsFriendBtn = document.getElementById('vs-friend');
    const difficultySelect = document.getElementById('difficulty-select');
    const roomControls = document.getElementById('room-controls');
    const roomStatus = document.getElementById('room-status');

    vsBotBtn.addEventListener('click', () => {
      isVsBot = true;
      difficultySelect.classList.remove('hidden');
      roomControls.classList.add('hidden');
      document.getElementById('start-match-btn').classList.remove('hidden');
    });

    vsFriendBtn.addEventListener('click', () => {
      isVsBot = false;
      difficultySelect.classList.add('hidden');
      roomControls.classList.remove('hidden');
      document.getElementById('start-match-btn').classList.add('hidden');
    });

    document.getElementById('create-room-btn').addEventListener('click', async () => {
      const code = Math.random().toString(36).substring(2, 8).toUpperCase();
      roomId = code;
      await db.ref(`rooms/${roomId}`).set({
        host: currentUser.uid,
        guest: null,
        gameState: null,
        status: 'waiting'
      });
      roomStatus.textContent = `Sala creada: ${code}. Esperando rival...`;
      // Escuchar cuando se una el rival
      db.ref(`rooms/${roomId}/guest`).on('value', snap => {
        if (snap.val()) {
          roomStatus.textContent += ' ¡Rival conectado!';
          startMatch(code);
        }
      });
    });

    document.getElementById('join-room-btn').addEventListener('click', () => {
      const code = document.getElementById('room-code-input').value.trim().toUpperCase();
      if (!code) return;
      roomId = code;
      db.ref(`rooms/${roomId}`).once('value', snap => {
        if (!snap.exists()) return alert('Sala no encontrada.');
        const room = snap.val();
        if (room.guest) return alert('Sala llena.');
        db.ref(`rooms/${roomId}/guest`).set(currentUser.uid);
        roomStatus.textContent = `Unido a sala ${code}.`;
        startMatch(code);
      });
    });

    document.getElementById('start-match-btn').addEventListener('click', () => {
      if (isVsBot) {
        difficulty = difficultySelect.value;
        startMatch(null);
      }
    });

    // ========================= PARTIDO 3D (Three.js) =========================
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, ball, playerHome, playerAway, field;
    let gameLoopInterval, matchTimerInterval;
    let matchState = {
      minute: 0,
      homeGoals: 0,
      awayGoals: 0,
      finished: false,
      lastAction: null,
      mode: 'cara', // o 'ataque'
      difficulty: 'medium'
    };

    function init3DScene() {
      const canvas = document.getElementById('gameCanvas');
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a2e);

      camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
      camera.position.set(0, 15, 25);
      camera.lookAt(0, 0, 0);

      // Iluminación
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(10, 20, 10);
      light.castShadow = true;
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x404040));

      // Suelo verde
      const grass = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 12),
        new THREE.MeshStandardMaterial({ color: 0x2e8b57 })
      );
      grass.rotation.x = -Math.PI/2;
      grass.receiveShadow = true;
      scene.add(grass);

      // Líneas blancas (aproximadas)
      const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
      // centro
      const centerLine = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0.01, -6), new THREE.Vector3(0, 0.01, 6)
      ]);
      scene.add(new THREE.Line(centerLine, lineMat));
      // áreas
      // ... simplificado

      // Balón
      const ballGeom = new THREE.SphereGeometry(0.3, 32, 32);
      const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      ball = new THREE.Mesh(ballGeom, ballMat);
      ball.position.set(0, 0.3, 0);
      ball.castShadow = true;
      scene.add(ball);

      // Jugador local (azul)
      playerHome = createPlayer(0xff4444);
      playerHome.position.set(-2, 0.5, 0);
      // Jugador rival (rojo)
      playerAway = createPlayer(0x4444ff);
      playerAway.position.set(2, 0.5, 0);

      // Porterías
      createGoal(-10, 0, 1.5, 0.5); // izquierda (rival)
      createGoal(10, 0, 1.5, 0.5);  // derecha (local)
    }

    function createPlayer(color) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 1, 8),
        new THREE.MeshStandardMaterial({ color })
      );
      body.position.y = 0.5;
      group.add(body);
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xffdbac })
      );
      head.position.y = 1.1;
      group.add(head);
      scene.add(group);
      return group;
    }

    function createGoal(x, y, height, depth) {
      const postMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
      const postLeft = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, 0.1), postMat);
      postLeft.position.set(x-0.75, height/2, 0);
      scene.add(postLeft);
      const postRight = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, 0.1), postMat);
      postRight.position.set(x+0.75, height/2, 0);
      scene.add(postRight);
      const crossbar = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.1), postMat);
      crossbar.position.set(x, height, 0);
      scene.add(crossbar);
    }

    function startMatch(room) {
      showScreen('game');
      init3DScene();
      matchState = {
        minute: 0,
        homeGoals: 0,
        awayGoals: 0,
        finished: false,
        mode: selectedMode,
        difficulty: isVsBot ? difficulty : 'medium',
        roomId: room
      };
      updateGameUI();

      // Si multijugador, sincronizar estado en la sala
      if (room && !isVsBot) {
        // Sincronizar acciones del oponente
      }

      // Cada 10 segundos = 1 minuto en modo Cara a Cara
      if (selectedMode === 'cara') {
        matchTimerInterval = setInterval(() => {
          if (matchState.finished) return;
          matchState.minute++;
          if (matchState.minute > 90) {
            finishMatch();
            return;
          }
          // Simular acciones automáticas (bot)
          if (isVsBot) {
            botAction();
          }
          updateGameUI();
        }, 10000);
      } else {
        // Ataque enfrentado: no hay temporizador, el usuario intenta marcar en un tiempo fijo (ej 120 segundos)
        let timeLeft = 120;
        const timer = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
            clearInterval(timer);
            finishMatch();
          }
        }, 1000);
      }

      // Controles de acciones (chutar, pasar, regate)
      document.getElementById('action-shoot').addEventListener('click', () => attemptShoot());
      document.getElementById('action-pass').addEventListener('click', () => attemptPass());
      document.getElementById('action-dribble').addEventListener('click', () => attemptDribble());

      animate();
    }

    function botAction() {
      // Simulación muy simple: probabilidad de gol rival según dificultad
      const diffChance = { easy: 0.1, medium: 0.3, hard: 0.5 };
      if (Math.random() < diffChance[matchState.difficulty]) {
        matchState.awayGoals++;
        showGoalEffect('rival');
      }
    }

    function attemptShoot() {
      if (matchState.finished) return;
      // Lanzar balón hacia portería rival (derecha)
      const targetX = 9.5;
      const duration = 1.5; // segundos
      animateBall(ball.position, new THREE.Vector3(targetX, 0.5, (Math.random()-0.5)*2), () => {
        // Gol si cruza la línea
        if (ball.position.x > 9) {
          matchState.homeGoals++;
          updateGameUI();
          showGoalEffect('local');
        }
      });
    }

    function attemptPass() {
      // Mover balón a un compañero (no implementado realmente)
      alert('Pase realizado (simulado)');
    }

    function attemptDribble() {
      alert('Regate realizado (simulado)');
    }

    function animateBall(from, to, callback) {
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / 1000 / 1.5, 1);
        ball.position.lerpVectors(from, to, progress);
        if (progress < 1) {
          requestAnimationFrame(step);
        } else if (callback) callback();
      }
      requestAnimationFrame(step);
    }

    function showGoalEffect(who) {
      // Simple destello
    }

    function finishMatch() {
      matchState.finished = true;
      clearInterval(matchTimerInterval);
      // Calcular recompensas y actualizar Firebase
      let reward = 0;
      if (matchState.homeGoals > matchState.awayGoals) {
        reward = matchState.homeGoals - matchState.awayGoals >= 5 ? 1000000 : 100000;
      } else if (matchState.homeGoals < matchState.awayGoals) {
        reward = 50000;
      } else {
        reward = 0; // empate sin monedas (podrías decidir)
      }
      if (reward > 0) {
        userRef().update({ monedas: (userData.monedas || 0) + reward });
      }
      alert(`Partido terminado. Has ganado ${reward} monedas.`);
      endMatch();
    }

    function endMatch() {
      clearInterval(matchTimerInterval);
      if (renderer) renderer.dispose();
      document.getElementById('gameCanvas').remove();
      const newCanvas = document.createElement('canvas');
      newCanvas.id = 'gameCanvas';
      document.getElementById('game-screen').prepend(newCanvas);
      showScreen('mainMenu');
    }

    function updateGameUI() {
      document.getElementById('match-minute').textContent = matchState.minute;
      document.getElementById('score-home').textContent = matchState.homeGoals;
      document.getElementById('score-away').textContent = matchState.awayGoals;
    }

    function animate() {
      if (!renderer || matchState.finished) return;
      requestAnimationFrame(animate);
      // Rotar jugadores o mover balón mínimamente
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    });

  </script>
</body>
</html>
